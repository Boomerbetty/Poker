<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fold or Feed — Pre-Flop Drill</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --felt: #0f3d1e;
    --felt-light: #1a5c2e;
    --felt-mid: #144d25;
    --gold: #d4a843;
    --gold-light: #f5d67a;
    --gold-dark: #8a6520;
    --cream: #f5f0e8;
    --card-white: #fefefe;
    --red: #c0392b;
    --red-light: #e74c3c;
    --black: #1a1a1a;
    --chip-red: #c0392b;
    --chip-black: #1e1e1e;
    --chip-green: #27ae60;
    --chip-blue: #2980b9;
    --text-muted: rgba(245,240,232,0.55);
    --border-gold: rgba(212,168,67,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--felt);
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
  }

  /* ─── HEADER ─── */
  .header {
    text-align: center;
    padding: 28px 20px 16px;
    border-bottom: 1px solid var(--border-gold);
    position: relative;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header p {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ─── PROGRESS BAR ─── */
  .progress-bar-wrap {
    max-width: 600px;
    margin: 14px auto 0;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    border: 1px solid var(--border-gold);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    transition: width 0.4s ease;
    border-radius: 4px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    max-width: 600px;
    margin: 6px auto 0;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ─── SCORE BADGE ─── */
  .score-badge {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border-gold);
    border-radius: 8px;
    padding: 6px 14px;
    text-align: center;
  }
  .score-badge .score-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold-light);
    font-weight: 700;
  }
  .score-badge .score-lbl {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ─── SETTINGS BADGE ─── */
  .settings-btn {
    position: absolute;
    top: 22px;
    left: 20px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-gold);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--gold);
    font-size: 12px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  .settings-btn:hover { background: rgba(0,0,0,0.5); }

  /* ─── MAIN LAYOUT ─── */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* ─── POSITION DISPLAY ─── */
  .position-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .position-tag {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 6px 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--gold-light);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .position-desc {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* ─── TABLE DIAGRAM ─── */
  .table-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }
  .poker-table-svg { width: 260px; height: 120px; }

  /* ─── CARDS ─── */
  .cards-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 22px;
  }
  .playing-card {
    width: 100px;
    height: 140px;
    background: var(--card-white);
    border-radius: 10px;
    border: 2px solid rgba(212,168,67,0.6);
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    animation: cardDeal 0.35s ease-out;
  }
  @keyframes cardDeal {
    from { opacity: 0; transform: translateY(-20px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-rank-top {
    position: absolute;
    top: 8px;
    left: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .card-suit-top {
    position: absolute;
    top: 30px;
    left: 11px;
    font-size: 16px;
    line-height: 1;
  }
  .card-rank-bot {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    transform: rotate(180deg);
  }
  .card-suit-bot {
    position: absolute;
    bottom: 30px;
    right: 11px;
    font-size: 16px;
    line-height: 1;
    transform: rotate(180deg);
  }
  .card-center-suit {
    font-size: 44px;
    line-height: 1;
  }
  .red-card .card-rank-top,
  .red-card .card-rank-bot,
  .red-card .card-suit-top,
  .red-card .card-suit-bot,
  .red-card .card-center-suit { color: var(--red); }
  .black-card .card-rank-top,
  .black-card .card-rank-bot,
  .black-card .card-suit-top,
  .black-card .card-suit-bot,
  .black-card .card-center-suit { color: var(--black); }

  /* ─── SUITED BADGE ─── */
  .suited-badge {
    display: inline-block;
    background: rgba(212,168,67,0.15);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 16px;
  }

  /* ─── ACTION PANEL ─── */
  .action-panel {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-gold);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .action-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    text-align: center;
  }

  /* PLAY/FOLD BUTTONS */
  .pf-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .btn-play, .btn-fold {
    flex: 1;
    padding: 14px;
    border-radius: 8px;
    border: 2px solid transparent;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-play {
    background: rgba(39,174,96,0.15);
    border-color: #27ae60;
    color: #2ecc71;
  }
  .btn-play:hover { background: rgba(39,174,96,0.3); transform: translateY(-1px); }
  .btn-play.selected { background: #27ae60; color: #fff; }

  .btn-fold {
    background: rgba(192,57,43,0.15);
    border-color: var(--red);
    color: var(--red-light);
  }
  .btn-fold:hover { background: rgba(192,57,43,0.3); transform: translateY(-1px); }
  .btn-fold.selected { background: var(--red); color: #fff; }

  /* BET SIZE (shown only when play is selected) */
  .bet-section {
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .bet-section.visible { display: flex; }
  .bet-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    text-align: center;
  }
  .bet-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-bet {
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border-gold);
    background: rgba(0,0,0,0.3);
    color: var(--gold);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .btn-bet:hover { background: rgba(212,168,67,0.15); border-color: var(--gold); }
  .btn-bet.selected { background: var(--gold-dark); border-color: var(--gold); color: var(--cream); }

  /* SUBMIT */
  .btn-submit {
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    border-radius: 8px;
    border: 2px solid var(--gold);
    background: rgba(212,168,67,0.1);
    color: var(--gold-light);
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.18s;
    display: none;
  }
  .btn-submit:hover { background: rgba(212,168,67,0.25); transform: translateY(-1px); }
  .btn-submit.visible { display: block; }

  /* ─── RESULT PANEL ─── */
  .result-panel {
    display: none;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
  .result-panel.correct { background: rgba(39,174,96,0.12); border: 1px solid rgba(39,174,96,0.4); }
  .result-panel.incorrect { background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.4); }
  .result-header {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .result-panel.correct .result-header { color: #2ecc71; }
  .result-panel.incorrect .result-header { color: var(--red-light); }
  .result-panel.visible { display: block; }
  .result-answer {
    font-size: 13px;
    color: var(--cream);
    margin-bottom: 10px;
    line-height: 1.6;
  }

  /* RATIONALE TOGGLE */
  .rationale-toggle {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--gold);
    cursor: pointer;
    text-decoration: underline;
    text-transform: uppercase;
    background: none;
    border: none;
    font-family: 'IBM Plex Sans', sans-serif;
    padding: 0;
  }
  .rationale-box {
    display: none;
    margin-top: 12px;
    padding: 14px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    border-left: 3px solid var(--gold-dark);
    font-size: 13px;
    line-height: 1.7;
    color: rgba(245,240,232,0.85);
  }
  .rationale-box.open { display: block; }
  .rationale-box strong { color: var(--gold-light); font-weight: 500; }

  /* NEXT HAND BUTTON */
  .btn-next {
    width: 100%;
    padding: 13px;
    margin-top: 12px;
    border-radius: 8px;
    border: 2px solid var(--gold);
    background: var(--gold-dark);
    color: var(--cream);
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-next:hover { background: var(--gold); color: var(--black); }

  /* ─── FINAL SCORE SCREEN ─── */
  .final-screen {
    display: none;
    text-align: center;
    padding: 30px 20px;
    animation: fadeIn 0.5s ease;
  }
  .final-screen.visible { display: block; }
  .final-grade {
    font-family: 'Playfair Display', serif;
    font-size: 80px;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
    margin-bottom: 8px;
  }
  .final-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .final-breakdown {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-gold);
    border-radius: 12px;
    padding: 20px;
    margin: 0 auto 24px;
    max-width: 420px;
    text-align: left;
  }
  .final-breakdown h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    text-align: center;
  }
  .breakdown-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
  }
  .breakdown-item:last-child { border-bottom: none; }
  .breakdown-hand { font-family: 'IBM Plex Mono', monospace; color: var(--cream); }
  .breakdown-pos { color: var(--text-muted); font-size: 11px; }
  .breakdown-result { font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
  .breakdown-result.ok { color: #2ecc71; }
  .breakdown-result.wrong { color: var(--red-light); }

  .coach-note {
    background: rgba(212,168,67,0.08);
    border: 1px solid rgba(212,168,67,0.25);
    border-radius: 10px;
    padding: 16px 20px;
    max-width: 500px;
    margin: 0 auto 24px;
    font-size: 13px;
    line-height: 1.7;
    color: rgba(245,240,232,0.85);
    text-align: left;
  }
  .coach-note strong { color: var(--gold-light); }

  .btn-restart {
    background: var(--gold-dark);
    border: 2px solid var(--gold);
    color: var(--cream);
    padding: 14px 40px;
    border-radius: 8px;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.18s;
  }
  .btn-restart:hover { background: var(--gold); color: var(--black); }

  /* ─── SETTINGS MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #0d3019;
    border: 1px solid var(--gold);
    border-radius: 14px;
    padding: 28px;
    width: 90%;
    max-width: 380px;
  }
  .modal-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold-light);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .setting-row label {
    font-size: 13px;
    color: var(--cream);
    letter-spacing: 0.5px;
  }
  .setting-row input[type=number] {
    width: 70px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border-gold);
    border-radius: 6px;
    color: var(--gold-light);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 6px 10px;
    text-align: center;
  }
  .btn-save {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: 2px solid var(--gold);
    background: var(--gold-dark);
    color: var(--cream);
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-save:hover { background: var(--gold); color: var(--black); }

  /* ─── CHIP TRAY ─── */
  .chip-tray {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    opacity: 0.5;
  }
  .chip {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 3px dashed rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    letter-spacing: 0;
    color: rgba(255,255,255,0.5);
  }

  .hand-num-display {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <h2>Session Settings</h2>
    <div class="setting-row">
      <label>Hands per session</label>
      <input type="number" id="handsInput" min="5" max="50" value="10">
    </div>
    <button class="btn-save" onclick="saveSettings()">Save &amp; Restart</button>
    <button class="btn-save" style="margin-top:8px; background:transparent; border-color: rgba(255,255,255,0.2); color: var(--text-muted);" onclick="closeSettings()">Cancel</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <button class="settings-btn" onclick="openSettings()">⚙ Settings</button>

// ═══════════════════════════════════════════════
//  SUIT DATA
// ═══════════════════════════════════════════════
const SUITS = ['♠','♥','♦','♣'];
const SUIT_COLOR = { '♠':'black','♣':'black','♥':'red','♦':'red' };

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let totalHands = 10;
let currentHand = 0;
let score = 0;
let correct = 0;
let history = [];
let selectedAction = null;
let selectedBet = null;
let currentHandData = null;

// ═══════════════════════════════════════════════
//  TABLE DIAGRAM
// ═══════════════════════════════════════════════
function drawTable(activeSeat) {
  const svg = document.getElementById('seatDots');
  const cx = 130, cy = 60, rx = 108, ry = 44;
  svg.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const angle = (i / 9) * 2 * Math.PI - Math.PI / 2;
    const x = cx + rx * Math.cos(angle);
    const y = cy + ry * Math.sin(angle);
    const isActive = i === activeSeat;
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', x);
    circle.setAttribute('cy', y);
    circle.setAttribute('r', isActive ? 9 : 6);
    circle.setAttribute('fill', isActive ? '#d4a843' : 'rgba(0,0,0,0.4)');
    circle.setAttribute('stroke', isActive ? '#f5d67a' : 'rgba(212,168,67,0.3)');
    circle.setAttribute('stroke-width', '1.5');
    svg.appendChild(circle);
    if (isActive) {
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x', x);
      text.setAttribute('y', y + 4);
      text.setAttribute('text-anchor','middle');
      text.setAttribute('font-size','6');
      text.setAttribute('font-family','IBM Plex Mono, monospace');
      text.setAttribute('fill','#0f3d1e');
      text.setAttribute('font-weight','bold');
      text.textContent = 'YOU';
      svg.appendChild(text);
    }
  }
}

// ═══════════════════════════════════════════════
//  CARD RENDERING
// ═══════════════════════════════════════════════
function renderCard(rank, suit) {
  const colorClass = SUIT_COLOR[suit] === 'red' ? 'red-card' : 'black-card';
  return `<div class="playing-card ${colorClass}">
    <div class="card-rank-top">${rank}</div>
    <div class="card-suit-top">${suit}</div>
    <div class="card-center-suit">${suit}</div>
    <div class="card-rank-bot">${rank}</div>
    <div class="card-suit-bot">${suit}</div>
  </div>`;
}

// ═══════════════════════════════════════════════
//  DEAL HAND
// ═══════════════════════════════════════════════
function dealHand() {
  // Pick random hand from library
  const handDef = HAND_LIBRARY[Math.floor(Math.random() * HAND_LIBRARY.length)];
  // Pick random position
  const pos = POSITIONS[Math.floor(Math.random() * POSITIONS.length)];

  // Assign suits
  let suit1, suit2;
  if (handDef.suited) {
    suit1 = suit2 = SUITS[Math.floor(Math.random() * SUITS.length)];
  } else {
    suit1 = SUITS[Math.floor(Math.random() * SUITS.length)];
    do { suit2 = SUITS[Math.floor(Math.random() * SUITS.length)]; } while (suit2 === suit1);
  }

  currentHandData = { handDef, pos, suit1, suit2 };

  // Update UI
  document.getElementById('handNumDisplay').textContent = `HAND ${currentHand + 1}`;
  document.getElementById('positionTag').textContent = pos.name;
  document.getElementById('positionDesc').textContent = pos.desc;
  document.getElementById('cardsRow').innerHTML = renderCard(handDef.r1, suit1) + renderCard(handDef.r2, suit2);
  document.getElementById('suitedBadge').textContent = handDef.suited ? '★ Suited' : 'Offsuit';

  drawTable(pos.seat);

  // Reset action state
  selectedAction = null;
  selectedBet = null;
  document.getElementById('btnPlay').classList.remove('selected');
  document.getElementById('btnFold').classList.remove('selected');
  document.getElementById('betSection').classList.remove('visible');
  document.getElementById('btnSubmit').classList.remove('visible');
  document.querySelectorAll('.btn-bet').forEach(b => b.classList.remove('selected'));
  document.getElementById('resultPanel').classList.remove('visible','correct','incorrect');
  document.getElementById('resultPanel').style.display = 'none';
}

// ═══════════════════════════════════════════════
//  ACTION SELECTION
// ═══════════════════════════════════════════════
function selectAction(action) {
  selectedAction = action;
  selectedBet = null;
  document.querySelectorAll('.btn-bet').forEach(b => b.classList.remove('selected'));

  if (action === 'play') {
    document.getElementById('btnPlay').classList.add('selected');
    document.getElementById('btnFold').classList.remove('selected');
    document.getElementById('betSection').classList.add('visible');
    document.getElementById('btnSubmit').classList.remove('visible');
  } else {
    document.getElementById('btnFold').classList.add('selected');
    document.getElementById('btnPlay').classList.remove('selected');
    document.getElementById('betSection').classList.remove('visible');
    document.getElementById('btnSubmit').classList.add('visible');
  }
}

function selectBet(bet) {
  selectedBet = bet;
  document.querySelectorAll('.btn-bet').forEach(b => {
    b.classList.toggle('selected', b.textContent === bet);
  });
  document.getElementById('btnSubmit').classList.add('visible');
}

// ═══════════════════════════════════════════════
//  SUBMIT ANSWER
// ═══════════════════════════════════════════════
function submitAnswer() {
  if (!selectedAction) return;
  if (selectedAction === 'play' && !selectedBet) return;

  const { handDef, pos, suit1, suit2 } = currentHandData;
  const shouldPlay = handDef.play.includes(pos.name);
  const playerPlayed = selectedAction === 'play';
  const isCorrect = playerPlayed === shouldPlay;

  if (isCorrect) {
    score += 10;
    correct++;
  }
  currentHand++;

  const handStr = `${handDef.r1}${suit1}${handDef.r2}${suit2}`;
  history.push({ handStr, pos: pos.name, isCorrect, shouldPlay, playerPlayed, betStr: selectedBet, handDef });

  // Show result
  const panel = document.getElementById('resultPanel');
  panel.style.display = 'block';
  panel.classList.add('visible', isCorrect ? 'correct' : 'incorrect');
  panel.classList.remove(isCorrect ? 'incorrect' : 'correct');

  document.getElementById('resultHeader').textContent = isCorrect ? '✓ Correct' : '✗ Wrong call';

  const correctAction = shouldPlay ? `Raise (open-raise from ${pos.name})` : `Fold from ${pos.name}`;
  const playerAction = playerPlayed ? `You chose: Play (${selectedBet})` : 'You chose: Fold';
  document.getElementById('resultAnswer').innerHTML =
    `<strong>${playerAction}</strong><br>Correct action: <strong>${correctAction}</strong>`;

  document.getElementById('rationaleBox').textContent = handDef.rationale;
  document.getElementById('rationaleBox').classList.remove('open');

  // Update scores
  updateScoreDisplay();

  // Disable buttons
  document.getElementById('btnPlay').disabled = true;
  document.getElementById('btnFold').disabled = true;
  document.querySelectorAll('.btn-bet').forEach(b => b.disabled = true);
  document.getElementById('btnSubmit').disabled = true;
}

function toggleRationale() {
  document.getElementById('rationaleBox').classList.toggle('open');
}

// ═══════════════════════════════════════════════
//  NEXT HAND / SCORE
// ═══════════════════════════════════════════════
function nextHand() {
  document.getElementById('btnPlay').disabled = false;
  document.getElementById('btnFold').disabled = false;
  document.querySelectorAll('.btn-bet').forEach(b => b.disabled = false);
  document.getElementById('btnSubmit').disabled = false;

  if (currentHand >= totalHands) {
    showFinalScreen();
  } else {
    dealHand();
  }
}

function updateScoreDisplay() {
  const pct = currentHand > 0 ? Math.round((score / (currentHand * 10)) * 100) : 0;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('handLabel').textContent = `Hand ${Math.min(currentHand + 1, totalHands)} of ${totalHands}`;
  document.getElementById('scoreLabel').textContent = `${correct} / ${currentHand} correct`;
  document.getElementById('progressBar').style.width = `${(currentHand / totalHands) * 100}%`;
}

// ═══════════════════════════════════════════════
//  FINAL SCREEN
// ═══════════════════════════════════════════════
function showFinalScreen() {
  document.getElementById('drillSection').style.display = 'none';
  const finalScreen = document.getElementById('finalScreen');
  finalScreen.classList.add('visible');

  const pct = Math.round((score / (totalHands * 10)) * 100);
  document.getElementById('finalGrade').textContent = pct + '%';
  document.getElementById('progressBar').style.width = '100%';

  // Coach note
  let note = '';
  if (pct === 100) {
    note = '<strong>Flawless execution.</strong> You have a solid grasp of positional hand selection. Now focus on bet sizing, 3-bet ranges, and postflop continuation — the discipline you showed here carries through every street. The piranha folds nothing it can eat, and neither should you.';
  } else if (pct >= 80) {
    note = '<strong>Strong session.</strong> You understand the core positional principles. Review your mistakes — they are almost certainly hands where you played too loose from early positions. That is the most common leak at the intermediate level.';
  } else if (pct >= 60) {
    note = '<strong>Progress, but there are leaks.</strong> The hands you missed are likely weak kings and queens from early position, or suited connectors you overvalued. Study the rationale for each wrong answer carefully before the next session.';
  } else {
    note = '<strong>You are playing too many hands.</strong> This is the single biggest leak in recreational poker. Tighten your UTG/UTG+1/MP ranges dramatically. Only the top 12–15% of hands should be played from early position. Review the rationale for every hand you missed.';
  }
  document.getElementById('coachNote').innerHTML = note;

  // Breakdown list
  const list = document.getElementById('breakdownList');
  list.innerHTML = history.map(h => `
    <div class="breakdown-item">
      <span>
        <span class="breakdown-hand">${h.handStr}</span>
        <span class="breakdown-pos"> · ${h.pos}</span>
      </span>
      <span class="breakdown-result ${h.isCorrect ? 'ok' : 'wrong'}">
        ${h.isCorrect ? '✓ +10' : '✗  +0'}
      </span>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════
function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function saveSettings() {
  const val = parseInt(document.getElementById('handsInput').value);
  if (val >= 5 && val <= 50) totalHands = val;
  closeSettings();
  restartGame();
}

// ═══════════════════════════════════════════════
//  RESTART
// ═══════════════════════════════════════════════
function restartGame() {
  currentHand = 0;
  score = 0;
  correct = 0;
  history = [];
  selectedAction = null;
  selectedBet = null;
  document.getElementById('drillSection').style.display = 'block';
  document.getElementById('finalScreen').classList.remove('visible');
  document.getElementById('scoreDisplay').textContent = '0';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('handLabel').textContent = `Hand 1 of ${totalHands}`;
  document.getElementById('scoreLabel').textContent = '0 / 0 correct';
  dealHand();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
dealHand();
</script>
